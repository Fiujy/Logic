services:
  app:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    environment:
      - CHOKIDAR_USEPOLLING=true

  postgres:
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: logic
      POSTGRES_USER: logic
      POSTGRES_PASSWORD: logic
    volumes:
      # Postgres 18+ : monter le répertoire parent (pas …/data seul)
      - postgres_data:/var/lib/postgresql

volumes:
  node_modules:
  postgres_data:
